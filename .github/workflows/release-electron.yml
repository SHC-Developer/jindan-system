name: Release Electron (Windows)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Firebase secrets
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          $missing = @()
          if (-not $env:VITE_FIREBASE_API_KEY) { $missing += "VITE_FIREBASE_API_KEY" }
          if (-not $env:VITE_FIREBASE_AUTH_DOMAIN) { $missing += "VITE_FIREBASE_AUTH_DOMAIN" }
          if (-not $env:VITE_FIREBASE_PROJECT_ID) { $missing += "VITE_FIREBASE_PROJECT_ID" }
          if (-not $env:VITE_FIREBASE_STORAGE_BUCKET) { $missing += "VITE_FIREBASE_STORAGE_BUCKET" }
          if (-not $env:VITE_FIREBASE_MESSAGING_SENDER_ID) { $missing += "VITE_FIREBASE_MESSAGING_SENDER_ID" }
          if (-not $env:VITE_FIREBASE_APP_ID) { $missing += "VITE_FIREBASE_APP_ID" }
          if ($missing.Count -gt 0) {
            Write-Error "다음 Repository Secret이 없습니다: $($missing -join ', ')"
          }
          Write-Host "Firebase Secrets 6개 설정됨."

      - name: Build Electron (web + main + pack) and publish to GitHub Release
        run: |
          $env:ELECTRON = "true"
          npx vite build
          npm run build:electron-main
          npx electron-builder --publish always
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify local release artifacts
        run: |
          $ok = $true
          if (-not (Test-Path "release\latest.yml")) {
            Write-Error "release\latest.yml not found"
            $ok = $false
          }
          if (-not (Get-ChildItem "release\*.exe" -ErrorAction SilentlyContinue)) {
            Write-Error "No .exe installer in release\"
            $ok = $false
          }
          if (-not (Get-ChildItem "release\*.blockmap" -ErrorAction SilentlyContinue)) {
            Write-Error "No .blockmap in release\"
            $ok = $false
          }
          if (-not $ok) { exit 1 }
          Write-Host "Local artifacts: latest.yml, .exe, .blockmap present."

      - name: Verify GitHub Release and assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag --repo SHC-Developer/jindan-system
          $assets = gh release view $tag --repo SHC-Developer/jindan-system --json assets -q ".assets | length"
          if ([int]$assets -lt 2) {
            Write-Error "Expected at least 2 assets (exe + latest.yml or more); got $assets"
            exit 1
          }
          Write-Host "GitHub Release $tag and assets verified."
